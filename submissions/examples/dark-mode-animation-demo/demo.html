<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>EaseMotion Dark Mode Demo</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/easemotion-css/easemotion.min.css">

</head>

<body>

    <div class="container ease-fade-in">

        <h1 class="ease-gradient-text">
            Dark Mode Animation Demo
        </h1>

        <p class="subtitle ease-slide-up">
            Animations that look beautiful on dark interfaces.
        </p>

        <div class="grid">

            <div class="card ease-hover-grow ease-slide-up">

                <h2>Fade In</h2>

                <p>
                    Uses EaseMotion animation classes inside a dark card.
                </p>

            </div>

            <div class="card ease-hover-grow ease-slide-up">

                <h2>Hover Grow</h2>

                <p>
                    Interactive hover animation with glowing surface.
                </p>

            </div>

            <div class="card ease-hover-grow ease-slide-up">

                <h2>Gradient Text</h2>

                <p>
                    Combines animation with modern dark UI styling.
                </p>

            </div>

        </div>

    </div>

</body>

</html>
